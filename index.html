<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MoneyMate — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
}

:root {
    --g-main:   linear-gradient(135deg, #7c3aed, #06b6d4);
    --g-hot:    linear-gradient(135deg, #ec4899, #f97316);
    --g-cool:   linear-gradient(135deg, #06b6d4, #10b981);
    --c-bg:     #07071a;
    --c-card:   #0f0f28;
    --c-border: rgba(255,255,255,0.08);
    --c-border-hi: rgba(255,255,255,0.15);
    --c-text:   #f0f0ff;
    --c-muted:  rgba(240,240,255,0.5);
    --c-dim:    rgba(240,240,255,0.22);
    --c-input:  rgba(255,255,255,0.05);
    --font:     'Outfit', sans-serif;
    --mono:     'JetBrains Mono', monospace;
    --radius:   16px;
    --radius-sm: 12px;
}

html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--c-bg);
    color: var(--c-text);
    overflow: hidden;
}

/* ── Animated background ── */
.bg {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
}

.bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: drift 20s ease-in-out infinite alternate;
}
.bg-orb:nth-child(1) {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.22) 0%, transparent 70%);
    top: -200px; left: -150px;
}
.bg-orb:nth-child(2) {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(6,182,212,0.18) 0%, transparent 70%);
    bottom: -150px; right: -100px;
    animation-duration: 24s;
    animation-direction: alternate-reverse;
}
.bg-orb:nth-child(3) {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(236,72,153,0.12) 0%, transparent 70%);
    top: 40%; left: 60%;
    animation-duration: 18s;
}
@keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.1); }
}

/* Grid lines background */
.bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.6) 0%, transparent 75%);
}

/* ── Centered layout ── */
.page {
    position: relative; z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
}

/* ── Brand mark at top ── */
.brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
    animation: fadeDown 0.6s ease both;
}

@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
}

.brand-logo {
    width: 52px; height: 52px;
    border-radius: 18px;
    background: var(--g-main);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    font-size: 22px;
    color: #fff;
    box-shadow: 0 0 40px rgba(124,58,237,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
}

.brand-info h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: var(--g-main);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.brand-info p {
    font-size: 11px;
    color: var(--c-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-top: 3px;
}

/* ── Card ── */
.card {
    width: 100%;
    max-width: 400px;
    background: var(--c-card);
    border: 1px solid var(--c-border);
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    animation: fadeUp 0.65s ease 0.1s both;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--g-main);
    border-radius: 24px 24px 0 0;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ── Tabs ── */
.tabs {
    display: flex;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--c-border);
    border-radius: var(--radius-sm);
    padding: 4px;
    gap: 4px;
    margin-bottom: 28px;
}

.tab-btn {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--c-muted);
    font-family: var(--font);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.2px;
}

.tab-btn.active {
    background: var(--g-main);
    color: #fff;
    box-shadow: 0 4px 20px rgba(124,58,237,0.35);
}

/* ── Input group ── */
.input-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
}

.input-wrap {
    position: relative;
}

.input-wrap .input-icon {
    position: absolute;
    left: 15px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: var(--c-dim);
    pointer-events: none;
    transition: color 0.2s;
}

.input-wrap input {
    width: 100%;
    height: 48px;
    background: var(--c-input);
    border: 1.5px solid var(--c-border);
    border-radius: var(--radius-sm);
    color: var(--c-text);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 400;
    padding: 0 16px 0 44px;
    outline: none;
    transition: all 0.25s;
}

.input-wrap input::placeholder { color: var(--c-dim); }

.input-wrap input:focus {
    border-color: #7c3aed;
    background: rgba(124,58,237,0.07);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.18);
}
.input-wrap input:focus + .input-icon,
.input-wrap:focus-within .input-icon {
    color: #a78bfa;
}

/* ── Primary button ── */
.btn-main {
    width: 100%;
    height: 50px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--g-main);
    color: #fff;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 0 30px rgba(124,58,237,0.35);
    position: relative;
    overflow: hidden;
    letter-spacing: 0.3px;
}
.btn-main::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.25s;
}
.btn-main:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 50px rgba(124,58,237,0.5);
}
.btn-main:hover::after { opacity: 1; }
.btn-main:active { transform: scale(0.99); }

/* ── Divider ── */
.divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
    color: var(--c-dim);
    font-size: 12px;
    letter-spacing: 0.5px;
}
.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--c-border);
}

/* ── Switch text ── */
.switch-text {
    text-align: center;
    font-size: 13.5px;
    color: var(--c-muted);
    margin-top: 18px;
}
.switch-text span {
    color: #a78bfa;
    cursor: pointer;
    font-weight: 600;
    transition: color 0.2s;
}
.switch-text span:hover { color: #c4b5fd; }

/* ── Form slide animation ── */
#loginBox, #registerBox {
    transition: opacity 0.25s, transform 0.25s;
}
#registerBox { display: none; }

/* ── Feature pills at bottom ── */
.features {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.65s ease 0.3s both;
}

.feat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 50px;
    border: 1px solid var(--c-border);
    background: rgba(255,255,255,0.03);
    font-size: 12px;
    color: var(--c-muted);
    font-weight: 500;
}

.feat-pill span { font-size: 13px; }
</style>
</head>
<body>

<!-- Background -->
<div class="bg">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>

<!-- Page content -->
<div class="page">

    <!-- Brand -->
    <div class="brand">
        <div class="brand-logo">M</div>
        <div class="brand-info">
            <h1>MoneyMate</h1>
            <p>Smart Expense Tracker</p>
        </div>
    </div>

    <!-- Auth card -->
    <div class="card">

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="tabLogin" onclick="showLogin()">Login</button>
            <button class="tab-btn" id="tabRegister" onclick="showRegister()">Sign Up</button>
        </div>

        <!-- LOGIN -->
        <div id="loginBox">
            <div class="input-group">
                <div class="input-wrap">
                    <input type="email" id="loginEmail" placeholder="Email address">
                    <span class="input-icon">✉</span>
                </div>
                <div class="input-wrap">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <span class="input-icon">🔒</span>
                </div>
            </div>
            <button class="btn-main" onclick="login()">Login →</button>
        </div>

        <!-- REGISTER -->
        <div id="registerBox">
            <div class="input-group">
                <div class="input-wrap">
                    <input type="text" id="name" placeholder="Full Name">
                    <span class="input-icon">👤</span>
                </div>
                <div class="input-wrap">
                    <input type="email" id="email" placeholder="Email address">
                    <span class="input-icon">✉</span>
                </div>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Create password">
                    <span class="input-icon">🔒</span>
                </div>
            </div>
            <button class="btn-main" onclick="register()">Create Account →</button>
        </div>

    </div>

    <!-- Feature pills -->
    <div class="features">
        <div class="feat-pill"><span>📊</span> Charts & Analytics</div>
        <div class="feat-pill"><span>🧠</span> AI Insights</div>
        <div class="feat-pill"><span>📥</span> CSV Export</div>
    </div>

</div>

<script>
function showRegister(){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("registerBox").style.display = "block";
    document.getElementById("tabLogin").classList.remove("active");
    document.getElementById("tabRegister").classList.add("active");
}

function showLogin(){
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("registerBox").style.display = "none";
    document.getElementById("tabLogin").classList.add("active");
    document.getElementById("tabRegister").classList.remove("active");
}

function register(){
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    if(name=="" || email=="" || password==""){
        alert("Please fill all fields");
        return;
    }

    let fd = new FormData();
    fd.append("name",name);
    fd.append("email",email);
    fd.append("password",password);

    fetch("api/register.php",{method:"POST",body:fd})
    .then(r=>r.text())
    .then(()=>{
        alert("Account Created Successfully");
        showLogin();
    });
}

function login(){
    let email = document.getElementById("loginEmail").value.trim();
    let password = document.getElementById("loginPassword").value.trim();

    if(email=="" || password==""){
        alert("Please enter email and password");
        return;
    }

    let fd = new FormData();
    fd.append("email",email);
    fd.append("password",password);

    fetch("api/login.php",{method:"POST",body:fd})
    .then(r=>r.text())
    .then(d=>{
        if(d.trim()=="admin"){
            window.location="admin.php";
        } else if(d.trim()=="user"){
            window.location="dashboard.php";
        } else {
            alert("Invalid Login");
        }
    });
}
</script>

</body>
</html>
